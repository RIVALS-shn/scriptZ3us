<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivals Script Hub</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        h1 { color: #00ff88; margin-bottom: 20px; }

        .script-container {
            width: 90%;
            max-width: 800px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            position: relative;
        }

        /* Zona unde stă scriptul tău */
        pre {
            background: #000;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto; /* Scroll dacă scriptul e lung */
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            color: #dcdcdc;
            max-height: 400px;
            overflow-y: auto;
        }

        button {
            background-color: #00ff88;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover { background-color: #00cc6e; transform: scale(1.01); }

        .copy-status {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            height: 20px;
            color: #00ff88;
        }
    </style>
</head>
<body>

    <h1>Rivals Script</h1>

    <div class="script-container">
        <!-- AICI LIPESTE SCRIPTUL TAU INTRE TAG-URILE <pre> -->
        <pre id="myScript">

loadstring(game:HttpGet("https://raw.githubusercontent.com/blackowl1231/Z3US/refs/heads/main/main.lua"))()
        </pre>
        <button onclick="copyScript()">COPY SCRIPT</button>
        <div id="status" class="copy-status"></div>
    </div>

    <script>
        function copyScript() {
            const scriptText = document.getElementById('myScript').innerText;
            const statusDiv = document.getElementById('status');

            navigator.clipboard.writeText(scriptText).then(() => {
                statusDiv.innerText = "COPIED TO CLIPBOARD!";
                setTimeout(() => { statusDiv.innerText = ""; }, 3000);
            }).catch(err => {
                statusDiv.innerText = "Error copying!";
                statusDiv.style.color = "red";
            });
        }
    </script>

</body>
</html>
